<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #004d40 0%, #00695c 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .error-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            color: white;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: bold;
            text-shadow: 5px 5px 10px rgba(0,0,0,0.2);
        }
        
        .error-message {
            font-size: 24px;
            margin: 20px 0;
        }
        
        .home-link {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: white;
            color: #004d40;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .home-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: #004d40;
        }
        
        .support-box {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <i class="fas fa-exclamation-triangle fa-4x mb-4"></i>
            <div class="error-code">500</div>
            <div class="error-message">Internal Server Error</div>
            <p class="mb-4">Something went wrong on our end. Please try again later.</p>
            
            <div class="support-box">
                <i class="fas fa-headset"></i>
                <p class="mb-0 mt-2">Need help? Contact our support team</p>
                <small>support@securebank.com | 1-800-BANKING</small>
            </div>
            
            <a href="/" class="home-link">
                <i class="fas fa-home"></i> Back to Home
            </a>
        </div>
    </div>
</body>
</html>
